services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tls-dataset:dev
    working_dir: /app
    environment:
      TLS_BACKEND_ENV: dev
      TLS_BACKEND_DATABASE_URL: postgresql+psycopg://tls_dataset:tls_dataset@postgres:5432/tls_dataset
      TLS_BACKEND_QUEUE_BACKEND: rq
      TLS_BACKEND_QUEUE_NAME: pcap_scoring
      TLS_BACKEND_REDIS_URL: redis://redis:6379/0
      TLS_BACKEND_OBJECT_STORE_BACKEND: s3
      TLS_BACKEND_OBJECT_STORE_BUCKET: tls-dataset
      TLS_BACKEND_S3_ENDPOINT_URL: http://minio:9000
      TLS_BACKEND_S3_REGION: us-east-1
      TLS_BACKEND_S3_ACCESS_KEY_ID: minioadmin
      TLS_BACKEND_S3_SECRET_ACCESS_KEY: minioadmin
      TLS_BACKEND_MODEL_BUNDLE_ROOT: /app/artifacts/ml_workflow
      TLS_BACKEND_DEFAULT_MODEL_BUNDLE_DIR: /app/artifacts/ml_workflow/latest
      TLS_BACKEND_JOB_RUN_ROOT: /app/artifacts/backend_jobs
      TLS_BACKEND_SCORING_ALLOW_QUALITY_FAILURES: "true"
      TLS_BACKEND_PCAP_DISPLAY_FILTER: tls or quic
      ZEEK_BIN: /opt/zeek/bin/zeek
    command: ["python", "-m", "uvicorn", "tls_dataset.backend.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /opt/zeek:/opt/zeek:ro
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: tls-dataset:dev
    working_dir: /app
    environment:
      TLS_BACKEND_ENV: dev
      TLS_BACKEND_DATABASE_URL: postgresql+psycopg://tls_dataset:tls_dataset@postgres:5432/tls_dataset
      TLS_BACKEND_QUEUE_BACKEND: rq
      TLS_BACKEND_QUEUE_NAME: pcap_scoring
      TLS_BACKEND_REDIS_URL: redis://redis:6379/0
      TLS_BACKEND_OBJECT_STORE_BACKEND: s3
      TLS_BACKEND_OBJECT_STORE_BUCKET: tls-dataset
      TLS_BACKEND_S3_ENDPOINT_URL: http://minio:9000
      TLS_BACKEND_S3_REGION: us-east-1
      TLS_BACKEND_S3_ACCESS_KEY_ID: minioadmin
      TLS_BACKEND_S3_SECRET_ACCESS_KEY: minioadmin
      TLS_BACKEND_MODEL_BUNDLE_ROOT: /app/artifacts/ml_workflow
      TLS_BACKEND_DEFAULT_MODEL_BUNDLE_DIR: /app/artifacts/ml_workflow/latest
      TLS_BACKEND_JOB_RUN_ROOT: /app/artifacts/backend_jobs
      TLS_BACKEND_SCORING_ALLOW_QUALITY_FAILURES: "true"
      TLS_BACKEND_PCAP_DISPLAY_FILTER: tls or quic
      ZEEK_BIN: /opt/zeek/bin/zeek
    command: ["python", "-m", "tls_dataset.backend.worker"]
    volumes:
      - .:/app
      - /opt/zeek:/opt/zeek:ro
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tls_dataset
      POSTGRES_USER: tls_dataset
      POSTGRES_PASSWORD: tls_dataset
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tls_dataset -d tls_dataset"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
